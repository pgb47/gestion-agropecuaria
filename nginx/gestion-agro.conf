server {
    listen 80;
    server_name localhost;

    # Archivos estaticos del cliente (CSS, JS, assets)
    location /assets/ {
        proxy_pass http://app:3000/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy inverso hacia n8n (resuelve CORS)
    location /webhook/ {
        proxy_pass https://auto09.academia.ar/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host auto09.academia.ar;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'Content-Type';

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'Content-Type';
            return 204;
        }
    }

    # Todo lo demas va a la app Node (SSR + fallback SPA)
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
